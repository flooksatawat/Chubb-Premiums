<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chubb Insurance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7fb; display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; margin: 0; color: #0f172a; overscroll-behavior-y: none; }
        .app-container { width: 100%; max-width: 440px; height: 100vh; height: 100dvh; background-color: #f8fafc; display: flex; flex-direction: column; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.15); }
        @media (min-width: 450px) { .app-container { height: 95vh; border-radius: 40px; border: 6px solid #ffffff; } }
        .content-area { flex: 1; overflow-y: auto; padding: 0 16px; display: flex; flex-direction: column; position: relative; z-index: 10; }
        
        .ambient-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .ambient-glow-1 { position: absolute; top: -10%; right: -15%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; filter: blur(40px); }
        .ambient-glow-2 { position: absolute; bottom: 10%; left: -15%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, rgba(16,185,129,0) 70%); border-radius: 50%; filter: blur(40px); }
        .glass-header { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.6); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); box-shadow: 0 -10px 40px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.8); }
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 24px); }
        .pt-safe { padding-top: max(env(safe-area-inset-top), 8px); }

        .premium-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-radius: 20px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.03), inset 0 1px 1px rgba(255, 255, 255, 1); border: 1px solid rgba(226, 232, 240, 0.6); padding: 16px; transition: transform 0.2s ease; }
        .input-box-rounded { width: 100%; border: 1px solid transparent; border-radius: 14px; text-align: center; outline: none; transition: all 0.3s; background: rgba(241, 245, 249, 0.8); color: #1e293b; font-weight: 800; font-size: 22px; height: 50px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .input-box-rounded:focus { background-color: #ffffff; border-color: rgba(59, 130, 246, 0.4); box-shadow: inset 0 0 0 2px rgba(59, 130, 246, 0.1), 0 8px 20px rgba(59, 130, 246, 0.08); color: #2563eb; }
        
        .active-male { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25); }
        .active-female { background: linear-gradient(135deg, #f43f5e, #e11d48); color: white; box-shadow: 0 6px 15px rgba(225, 29, 72, 0.25); }
        .active-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25); }
        
        .quick-pill-container { background: rgba(241, 245, 249, 0.7); padding: 5px; border-radius: 14px; display: flex; gap: 4px; height: 42px; border: 1px solid rgba(255,255,255,0.5); }
        .quick-pill { font-size: 11px; font-weight: 700; border-radius: 10px; background-color: transparent; color: #64748b; border: none; transition: all 0.2s; flex: 1; text-align: center; display: flex; align-items: center; justify-content: center;}
        .quick-pill:hover { background-color: rgba(255,255,255,0.8); color: #334155; }
        .quick-pill:active { background-color: #ffffff; color: #2563eb; transform: scale(0.92); }
        
        @keyframes bgFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-primary { background: linear-gradient(135deg, #1e3a8a, #3b82f6, #1e3a8a); background-size: 200% 200%; animation: bgFlow 6s ease infinite; color: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }

        .modal-overlay { background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); transition: opacity 0.3s ease; opacity: 0; pointer-events: none; visibility: hidden; z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; visibility: visible; }
        .modal-content-card { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); width: 100%; max-width: 24rem; border-radius: 36px; overflow: hidden; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(20px) scale(0.95); transition: all 0.3s ease; }
        .modal-overlay.show .modal-content-card { transform: translateY(0) scale(1); }
        .hidden { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .nav-item { position: relative; transition: all 0.3s; cursor: pointer; }
        .nav-item.active { color: #2563eb; transform: translateY(-2px); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background-color: #2563eb; border-radius: 50%; }
        @keyframes gold-shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .text-shine-gold { background: linear-gradient(120deg, #fef08a 20%, #ffffff 40%, #ffffff 60%, #fef08a 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: gold-shine 3s linear infinite; }
    </style>
    <script src="config.js"></script>
    <script>
        // Fallback Database in case config.js is missing
        const DEFAULT_CONFIG = {
            "Life Protector 20": { abbr: "LPB", desc: "เปลี่ยนทุนประกัน เป็นบำนาญ", icon: "fas fa-piggy-bank", color: "text-emerald-500", bg: "bg-emerald-100", uiMode: "TABLE", defaultSum: 1000000, actionBtnText: "ตารางมูลค่า", planOptions: [] }
        };
        const ACTIVE_DB = typeof INSURANCE_CONFIG !== 'undefined' ? INSURANCE_CONFIG : DEFAULT_CONFIG;
    </script>
</head>
<body>
    <div class="app-container">
        <div class="ambient-bg"><div class="ambient-glow-1"></div><div class="ambient-glow-2"></div></div>
        
        <div id="mainView" class="flex flex-col flex-1 overflow-hidden w-full relative z-10">
            <div class="w-full z-20 pt-safe px-4 pb-0 shrink-0 relative mt-1.5">
                <button id="mainHeaderBtn" onclick="openPlanModal()" class="w-full bg-gradient-to-br from-[#243c94] via-[#2a45a3] to-[#1e327a] rounded-[24px] py-4 px-4 flex flex-col items-center justify-center shadow-[0_10px_25px_rgba(36,60,148,0.3)] border border-[#60a5fa]/30 active:scale-[0.97] transition-all relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-full h-[45%] bg-gradient-to-b from-white/20 to-transparent rounded-t-[24px]"></div>
                    <h1 class="text-[20px] font-black text-white leading-none tracking-wide mb-1.5 relative z-10"><span id="headerTitleText">โหลดข้อมูล...</span></h1>
                    <div class="flex items-center gap-1 opacity-90 bg-white/10 px-2 py-0.5 rounded-full border border-white/20">
                        <i class="fas fa-hand-pointer text-[8px] text-white"></i><span class="text-[9px] font-medium text-white tracking-wide">กดเพื่อเปลี่ยนแบบประกัน</span>
                    </div>
                </button>
            </div>

            <div class="content-area pt-4 no-scrollbar pb-[110px]">
                <div class="flex flex-col gap-3 shrink-0">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="premium-card !p-1.5 flex h-[50px]">
                            <button onclick="setGender('male')" id="btnMale" class="flex-1 rounded-[14px] text-[15px] font-bold active-male text-white transition-all">ชาย</button>
                            <button onclick="setGender('female')" id="btnFemale" class="flex-1 rounded-[14px] text-[15px] font-bold text-slate-500 hover:bg-slate-50 transition-all">หญิง</button>
                        </div>
                        <div class="premium-card !p-1.5 flex items-center justify-between h-[50px]">
                            <button onclick="adjustAge(-1)" class="w-12 h-full flex items-center justify-center text-slate-400 hover:text-blue-600 rounded-[14px] hover:bg-slate-50"><i class="fas fa-minus text-[14px]"></i></button>
                            <input type="number" id="ageInput" value="30" min="0" max="65" class="w-14 bg-transparent border-none text-center font-black text-[22px] text-slate-800 outline-none p-0" oninput="calculate('sum')">
                            <button onclick="adjustAge(1)" class="w-12 h-full flex items-center justify-center text-slate-400 hover:text-blue-600 rounded-[14px] hover:bg-slate-50"><i class="fas fa-plus text-[14px]"></i></button>
                        </div>
                    </div>
                    
                    <div id="planSelectionWrapper" class="shrink-0 hidden mt-1">
                        <div class="premium-card !p-1.5">
                            <div id="planSelectionContainer" class="flex gap-2"></div>
                        </div>
                    </div>
                </div>

                <div id="threeDExtraOptions" class="hidden flex-col gap-3 shrink-0 mt-3">
                    <div class="premium-card !p-2">
                        <p class="text-slate-400 text-[10px] font-bold mb-1 text-center uppercase">เลือกแผนหลัก 3D (HX)</p>
                        <select id="hxSelect" class="w-full h-[36px] bg-blue-50 text-blue-700 border-blue-100 rounded-[10px] font-bold text-sm text-center outline-none" onchange="calculate('sum')">
                            <option value="none">ไม่ระบุ</option>
                            <option value="HX15">HX15</option><option value="HX20">HX20</option><option value="HX40">HX40</option>
                            <option value="HX60">HX60</option><option value="HX150">HX150</option><option value="HX300">HX300</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="premium-card !p-2">
                            <p class="text-slate-400 text-[10px] font-bold mb-1 text-center uppercase">เลือก Extra (HXO)</p>
                            <select id="extraSelect" class="w-full h-[36px] bg-blue-50 text-blue-700 border-blue-100 rounded-[10px] font-bold text-sm text-center outline-none" onchange="calculate('sum')">
                                <option value="none">ไม่เลือก</option>
                                <option value="HX010">HX010</option><option value="HX020">HX020</option><option value="HX030">HX030</option>
                            </select>
                        </div>
                        <div class="premium-card !p-2">
                            <p class="text-slate-400 text-[10px] font-bold mb-1 text-center uppercase">เลือก Advance (HXD)</p>
                            <select id="advanceSelect" class="w-full h-[36px] bg-blue-50 text-blue-700 border-blue-100 rounded-[10px] font-bold text-sm text-center outline-none" onchange="calculate('sum')">
                                <option value="none">ไม่เลือก</option>
                                <option value="HXD100">HXD100</option><option value="HXD200">HXD200</option>
                                <option value="HXD500">HXD500</option><option value="HXD1000">HXD1000</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="premium-card shrink-0 mt-3" id="sumInsuredContainer">
                    <div class="flex justify-between items-center mb-3">
                        <p id="sumInsuredLabel" class="text-slate-600 text-[13px] font-bold flex items-center gap-1.5"><i class="fas fa-shield-halved text-emerald-500"></i> วงเงินคุ้มครอง (บาท)</p>
                    </div>
                    <div class="quick-pill-container mb-3" id="sumQuickPills"></div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-lg">฿</span>
                        <input type="text" id="sumInsuredInput" value="1,000,000" class="input-box-rounded pl-8" oninput="handleCurrencyInput(this, 'sum')">
                    </div>
                </div>

                <div class="premium-card shrink-0 mt-3" id="premiumContainer">
                    <div class="flex justify-between items-center mb-3">
                        <p class="text-slate-600 text-[13px] font-bold flex items-center gap-1.5"><i class="fas fa-wallet text-blue-500"></i> เบี้ยประกันรวม</p>
                    </div>
                    <div id="premiumPillContainer" class="quick-pill-container mb-3"></div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-lg">฿</span>
                        <input type="text" id="premiumInput" class="input-box-rounded pl-8 text-blue-700" value="0" oninput="handleCurrencyInput(this, 'premium')">
                    </div>
                </div>

                <div class="premium-card shrink-0 hidden mt-3 border-emerald-200 bg-emerald-50/30" id="cashFlowContainer">
                    <div class="flex justify-between items-center mb-2.5"><p class="text-emerald-700 text-[13px] font-bold flex items-center gap-1.5"><i class="fas fa-money-bill-trend-up"></i> กระแสเงินสด (บาท/ปี)</p></div>
                    <div class="quick-pill-container bg-emerald-100/50 mb-3">
                        <button onclick="setQuickCashFlow(50000)" class="quick-pill hover:bg-emerald-200">5 หมื่น</button>
                        <button onclick="setQuickCashFlow(100000)" class="quick-pill hover:bg-emerald-200">1 แสน</button>
                        <button onclick="setQuickCashFlow(120000)" class="quick-pill hover:bg-emerald-200 text-emerald-700 font-black">1.2 แสน</button>
                        <button onclick="setQuickCashFlow(300000)" class="quick-pill hover:bg-emerald-200">3 แสน</button>
                        <button onclick="setQuickCashFlow(500000)" class="quick-pill hover:bg-emerald-200">5 แสน</button>
                    </div>
                    <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500 font-bold text-lg">฿</span><input type="text" id="cashFlowInput" value="120,000" class="input-box-rounded pl-8 text-emerald-700 bg-white" oninput="handleCurrencyInput(this, 'cashflow')"></div>
                </div>
                
                <div class="mt-4 grid grid-cols-4 gap-3">
                    <button id="mainActionBtn" onclick="mainActionTrigger()" class="col-span-3 w-full btn-primary h-[54px] font-bold flex justify-center items-center gap-2 text-[16px]">
                        <i class="fas fa-table text-lg"></i> ตารางมูลค่า
                    </button>
                    <button class="col-span-1 w-full h-[54px] bg-gradient-to-br from-emerald-400 to-teal-600 text-white rounded-[16px] font-bold flex flex-col justify-center items-center text-[12px] shadow-[0_8px_15px_rgba(16,185,129,0.3)]">
                        <i class="fas fa-share-nodes text-[20px]"></i><span>แชร์</span>
                    </button>
                </div>

                <div id="bottomActionGroup" class="mt-4">
                    <div class="grid grid-cols-2 gap-3">
                        <button class="w-full bg-white border border-slate-200 text-slate-700 h-[48px] rounded-[16px] text-[14px] font-bold flex items-center justify-center gap-2 shadow-sm active:bg-slate-50">
                            <i class="fas fa-credit-card text-blue-500"></i> ตัวเลือกชำระ
                        </button>
                        <button class="w-full bg-white border border-slate-200 text-slate-700 h-[48px] rounded-[16px] text-[14px] font-bold flex items-center justify-center gap-2 shadow-sm active:bg-slate-50">
                            <i class="fas fa-building-columns text-emerald-500"></i> บัญชีโอนเงิน
                        </button>
                    </div>
                    <button class="w-full mt-3 bg-white border border-rose-100 text-rose-700 h-[48px] rounded-[16px] text-[14px] font-bold flex items-center justify-center gap-2 shadow-sm hover:bg-rose-50 active:scale-95 transition-transform">
                        <i class="fas fa-laptop-code"></i> E-Submission & QNI <i class="fas fa-chevron-right text-[10px] ml-1 opacity-50"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="tableView" class="hidden flex flex-col flex-1 overflow-hidden w-full relative z-10">
            <div class="glass-header flex justify-between items-center px-4 pt-safe pb-3 shrink-0 border-b border-slate-200 mt-1">
                <h3 id="tableHeaderTitle" class="text-[14px] font-black text-slate-800 leading-tight truncate w-[75%]"></h3>
                <button class="bg-red-50 text-red-600 px-3 py-1.5 rounded-xl text-[11px] font-bold"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <div class="flex-1 min-h-0 flex flex-col bg-white/60 overflow-y-auto custom-scrollbar pb-[110px]" id="pdfTableTarget">
                <table class="w-full text-[12px] text-center border-collapse">
                    <thead class="sticky top-0 z-30 bg-slate-50/90 shadow-sm" id="policyTableHead"></thead>
                    <tbody id="policyTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="cashView" class="hidden flex flex-col flex-1 overflow-hidden w-full relative z-10">
            <div class="w-full z-20 pt-safe px-4 pb-1 shrink-0 relative mt-2 text-center">
                <div class="bg-gradient-to-br from-[#243c94] to-[#1e327a] rounded-[24px] py-4 shadow-lg">
                    <h3 class="text-[24px] font-black text-shine-gold leading-none">CASH</h3>
                    <p class="text-[9px] text-amber-100 uppercase tracking-widest mt-1">Commission & Bonus</p>
                </div>
            </div>
            <div class="flex-1 px-4 py-3 overflow-y-auto pb-[110px]">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4" id="comList">
                    <p class="text-center text-slate-400 font-bold py-10">รอข้อมูลอัตราคอมมิชชั่นจาก Config...</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 z-50 flex flex-col items-center pt-8 pb-safe bg-gradient-to-t from-[#f4f7fb] to-transparent pointer-events-none">
            <div class="glass-nav rounded-[20px] flex justify-around items-center px-2 py-1.5 pointer-events-auto w-[calc(100%-2rem)] max-w-[400px]">
                <button class="nav-item active flex flex-col items-center py-1 w-1/4 text-slate-400" onclick="switchView('main')"><i class="fas fa-calculator text-[20px]"></i><span class="text-[9px] font-bold">คำนวณ</span></button>
                <button class="nav-item flex flex-col items-center py-1 w-1/4 text-slate-400" onclick="switchView('table')"><i class="fas fa-table-list text-[20px]"></i><span class="text-[9px] font-bold">ตาราง</span></button>
                <button class="nav-item flex flex-col items-center py-1 w-1/4 text-slate-400" onclick="switchView('cash')"><i class="fas fa-money-bill-trend-up text-[20px]"></i><span class="text-[9px] font-bold">คอมมิชชัน</span></button>
            </div>
        </div>
    </div>
    
    <div id="planSelectModal" class="modal-overlay">
        <div class="modal-content-card h-[80vh]">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold">เลือกแบบประกัน</h3>
                <button onclick="closePopup('planSelectModal')" class="text-xl font-black text-slate-400 hover:text-red-500">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 bg-slate-50" id="unifiedPlanList"></div>
        </div>
    </div>

    <script>
        const setText = (id, text) => { const el = document.getElementById(id); if (el) el.innerText = text; };
        const formatNum = (num) => { const rounded = Math.round(num * 100) / 100; return Number.isInteger(rounded) ? rounded.toLocaleString() : rounded.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); };
        
        let currentAppPlan = "Life Protector 20";
        let currentPlan = '', currentGender = 'male', lastCalculationData = null, currentMode = 'sum';
        
        function getActiveConfig() { return ACTIVE_DB[currentAppPlan]; }
        function openPopup(id) { const modal = document.getElementById(id); if (modal) { modal.classList.remove('hidden'); setTimeout(() => { modal.classList.add('show'); }, 10); } }
        function closePopup(id) { const modal = document.getElementById(id); if (modal) { modal.classList.remove('show'); setTimeout(() => { modal.classList.add('hidden'); }, 300); } }
        
        function handleCurrencyInput(el, source) { let v = el.value.replace(/,/g, '').split('.')[0]; if (!isNaN(v) && v !== '') { el.value = Number(v).toLocaleString(); if(source !== 'cashflow') calculate(source); } }
        function setQuickSum(val) { document.getElementById('sumInsuredInput').value = val.toLocaleString(); calculate('sum'); }
        function setQuickPremium(val) { document.getElementById('premiumInput').value = val.toLocaleString(); calculate('premium'); }
        function setQuickCashFlow(val) { document.getElementById('cashFlowInput').value = val.toLocaleString(); }
        function adjustAge(delta) { const input = document.getElementById('ageInput'); let val = parseInt(input.value) + delta; if (val >= 0 && val <= 65) { input.value = val; calculate('sum'); } }
        
        function setGender(gender) { 
            currentGender = gender; 
            document.getElementById('btnMale').className = gender === 'male' ? 'flex-1 rounded-[14px] text-[15px] font-bold active-male text-white transition-all' : 'flex-1 rounded-[14px] text-[15px] font-bold text-slate-500 hover:bg-slate-50 transition-all';
            document.getElementById('btnFemale').className = gender === 'female' ? 'flex-1 rounded-[14px] text-[15px] font-bold active-female text-white transition-all' : 'flex-1 rounded-[14px] text-[15px] font-bold text-slate-500 hover:bg-slate-50 transition-all';
            calculate('sum'); 
        }

        function setPlan(planId) { 
            currentPlan = planId; 
            const config = getActiveConfig();
            const wrapper = document.getElementById('planSelectionWrapper');
            const container = document.getElementById('planSelectionContainer');
            
            if(container && config.planOptions && config.planOptions.length > 0) {
                wrapper.style.display = 'block';
                container.className = config.planOptions.length > 2 ? 'grid grid-cols-2 gap-2 w-full' : 'flex gap-2 w-full';
                container.innerHTML = config.planOptions.map(p => {
                    const isTarget = p === currentPlan;
                    const btnClass = isTarget ? 'flex-1 rounded-[14px] text-[14px] font-bold active-blue text-white transition-all h-[38px]' : 'flex-1 rounded-[14px] text-[14px] font-bold text-slate-500 hover:bg-slate-50 transition-all border border-slate-100 h-[38px]';
                    return `<button onclick="setPlan('${p}')" class="${btnClass}">${p}</button>`;
                }).join('');
            } else {
                wrapper.style.display = 'none';
                if (container) container.innerHTML = ''; 
            }
            calculate('sum'); 
        }

        function calculate(source = currentMode) { 
            currentMode = source;
            const config = getActiveConfig();
            const age = parseInt(document.getElementById('ageInput').value) || 0; 
            
            let baseRate = 0, hxPrem = 0; 
            let planKey = currentPlan || currentAppPlan;
            
            // รอรับข้อมูลจากฐานข้อมูล
            if(typeof BASE_RATES !== 'undefined' && BASE_RATES[planKey] && BASE_RATES[planKey][currentGender]) {
                baseRate = BASE_RATES[planKey][currentGender][age] || 0;
            }

            let fSum = 0, fPrem = 0; 
            if (source === 'sum') { 
                fSum = parseFloat(document.getElementById('sumInsuredInput').value.replace(/,/g, '')) || 0; 
                fPrem = Math.round((fSum / 1000) * baseRate) + hxPrem; 
                document.getElementById('premiumInput').value = fPrem.toLocaleString(); 
            } else { 
                fPrem = parseFloat(document.getElementById('premiumInput').value.replace(/,/g, '')) || 50000; 
                if(baseRate > 0) {
                    fSum = Math.round(((fPrem - hxPrem) * 1000) / baseRate); 
                }
                document.getElementById('sumInsuredInput').value = formatNum(Math.max(0, fSum)); 
            } 
            
            lastCalculationData = { premium: fPrem, sum: fSum, gender: currentGender, age: age }; 
            return lastCalculationData; 
        }

        function mainActionTrigger() { 
            const config = getActiveConfig();
            if(config.uiMode.includes('TABLE')) {
                switchView('table');
            } else {
                alert("ระบบเตรียมเปิดหน้าป๊อปอัปสำหรับ " + currentAppPlan + " (รอนำเข้าเทมเพลต)");
            }
        }

        function switchView(targetView) {
            const views = { 'main': document.getElementById('mainView'), 'table': document.getElementById('tableView'), 'cash': document.getElementById('cashView') };
            const navBtns = document.querySelectorAll('.nav-item');
            
            Object.values(views).forEach(view => view.classList.add('hidden'));
            navBtns.forEach(btn => btn.classList.remove('active'));
            
            if (views[targetView]) views[targetView].classList.remove('hidden');
            
            if(targetView === 'main') navBtns[0].classList.add('active');
            if(targetView === 'table') navBtns[1].classList.add('active');
            if(targetView === 'cash') navBtns[2].classList.add('active');
        }

        function renderUnifiedPlanList() {
            const container = document.getElementById('unifiedPlanList');
            const keys = Object.keys(ACTIVE_DB);
            container.innerHTML = keys.map(key => {
                const p = ACTIVE_DB[key];
                const isActive = key === currentAppPlan;
                const cardClass = isActive ? 'border-blue-400 bg-blue-50' : 'border-transparent bg-white hover:bg-slate-50 shadow-sm';
                return `
                <button onclick="selectAppPlan('${key}')" class="w-full flex items-center text-left p-3.5 rounded-[20px] border ${cardClass} mb-2">
                    <div class="w-12 h-12 rounded-[14px] ${p.bg} ${p.color} flex items-center justify-center text-[20px] shrink-0 mr-4 shadow-inner"><i class="${p.icon}"></i></div>
                    <div class="flex-1"><h4 class="text-[15px] font-bold text-slate-800">${key}</h4><p class="text-[11px] text-slate-500 font-medium">${p.desc}</p></div>
                </button>`;
            }).join('');
        }

        function openPlanModal() { renderUnifiedPlanList(); openPopup('planSelectModal'); }

        function selectAppPlan(planName) {
            closePopup('planSelectModal'); currentAppPlan = planName; 
            const config = getActiveConfig();
            
            document.getElementById('headerTitleText').innerText = planName;

            const isCashFlow = config.uiMode.includes('CASHFLOW');
            const is3D = config.uiMode === 'POPUP_3D';
            
            document.getElementById('cashFlowContainer').classList.toggle('hidden', !isCashFlow);
            document.getElementById('threeDExtraOptions').classList.toggle('hidden', !is3D);
            document.getElementById('threeDExtraOptions').classList.toggle('flex', is3D);
            
            document.getElementById('sumInsuredLabel').innerHTML = is3D 
                ? `<i class="fas fa-shield-halved text-emerald-500"></i> ทุนหลัก CL (บาท)`
                : `<i class="fas fa-shield-halved text-emerald-500"></i> วงเงินคุ้มครอง (บาท)`;

            document.getElementById('mainActionBtn').innerHTML = `<i class="fas ${config.uiMode.includes('TABLE') ? 'fa-table' : 'fa-file-alt'} text-lg"></i> ${config.actionBtnText}`;
            
            document.getElementById('sumInsuredInput').value = formatNum(config.defaultSum);
            
            const planSelectionWrapper = document.getElementById('planSelectionWrapper');
            if(config.planOptions && config.planOptions.length > 0) {
                planSelectionWrapper.style.display = 'block';
                setPlan(config.planOptions[0]);
            } else {
                planSelectionWrapper.style.display = 'none';
                currentPlan = '';
            }

            const isHighValue = config.defaultSum >= 5000000;
            const sumPillsHtml = isHighValue 
                ? `<button onclick="setQuickSum(500000)" class="quick-pill">5 แสน</button><button onclick="setQuickSum(1000000)" class="quick-pill">1 ล้าน</button><button onclick="setQuickSum(5000000)" class="quick-pill">5 ล้าน</button><button onclick="setQuickSum(10000000)" class="quick-pill">10 ล้าน</button>`
                : `<button onclick="setQuickSum(100000)" class="quick-pill">1 แสน</button><button onclick="setQuickSum(500000)" class="quick-pill">5 แสน</button><button onclick="setQuickSum(1000000)" class="quick-pill">1 ล้าน</button><button onclick="setQuickSum(3000000)" class="quick-pill">3 ล้าน</button>`;
            
            const premPillsHtml = isHighValue
                ? `<button onclick="setQuickPremium(100000)" class="quick-pill">1 แสน</button><button onclick="setQuickPremium(200000)" class="quick-pill">2 แสน</button><button onclick="setQuickPremium(500000)" class="quick-pill">5 แสน</button><button onclick="setQuickPremium(1000000)" class="quick-pill">1 ล้าน</button>`
                : `<button onclick="setQuickPremium(12000)" class="quick-pill">12,000</button><button onclick="setQuickPremium(24000)" class="quick-pill">24,000</button><button onclick="setQuickPremium(36000)" class="quick-pill">36,000</button><button onclick="setQuickPremium(48000)" class="quick-pill">48,000</button>`;

            document.getElementById('sumQuickPills').innerHTML = sumPillsHtml;
            document.getElementById('premiumPillContainer').innerHTML = premPillsHtml;

            calculate('sum'); 
        }

        window.onload = () => { selectAppPlan("Life Protector 20"); };
    </script>
</body>
</html>
